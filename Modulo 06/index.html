<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="game-container">
        <h1>Jogo de Adivinhação</h1>
        <p class="instrucoes">Tente adivinhar o número secreto entre 1 e 100.</p>

        <section class="input-group">
            <input type="number" id="palpite" placeholder="Digite seu palpite" min="1" max="100">
            <button id="btn-chutar" onclick="verificarPalpite()">Chutar</button>
        </section>

        <p id="mensagem">Faça seu primeiro palpite!</p>
        <p id="tentativas">Tentativas restantes: 10</p>
    </main>

    <script src="script.js"></script>
</body>

</html>
