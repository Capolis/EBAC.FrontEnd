<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <article class="container">

            <header class="header-content">
                <h1>Calculadora de IMC</h1>
                <nav aria-label="Controles de tema">
                    <button id="theme-toggle" aria-label="Alternar Tema">☀️</button>
                </nav>
            </header>

            <section class="inputs-area" aria-label="Formulário de dados">
                <p class="input-group">
                    <label for="peso">Peso (kg):</label>
                    <input type="number" id="peso" placeholder="Ex: 70.5" step="0.1">
                </p>

                <p class="input-group">
                    <label for="altura">Altura (m):</label>
                    <input type="number" id="altura" placeholder="Ex: 1.75" step="0.01">
                </p>

                <button id="calcular">Calcular</button>
            </section>

            <section id="resultado-container" class="hidden" aria-live="polite">
                <p>Seu IMC é: <strong id="valor-imc"></strong></p>
                <p>Classificação: <strong id="classificacao-imc"></strong></p>
            </section>

        </article>
    </main>

    <script src="script.js"></script>
</body>

</html>
